name: Build and Deploy to Steam

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"          # pin to exact version you use locally
  EXPORT_NAME: Huebound

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import Project
        run: godot --headless --import

      - name: Build Full Game
        run: |
          mkdir -p deploy/game
          sed -i 's/^const IS_DEMO\s*:=\s*true/const IS_DEMO := false/' scripts/autoloads/demo_config.gd
          grep "IS_DEMO" scripts/autoloads/demo_config.gd
          godot --headless --export-release "Steam Windows" deploy/game/Huebound.exe

      - name: Build Demo
        run: |
          mkdir -p deploy/demo
          sed -i 's/^const IS_DEMO\s*:=\s*false/const IS_DEMO := true/' scripts/autoloads/demo_config.gd
          grep "IS_DEMO" scripts/autoloads/demo_config.gd
          godot --headless --export-release "Steam Windows" deploy/demo/Huebound_Demo.exe
          sed -i 's/^const IS_DEMO\s*:=\s*true/const IS_DEMO := false/' scripts/autoloads/demo_config.gd

      - name: Deploy Main Game to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: 4459040
          buildDescription: "Build ${{ github.sha }}"
          rootPath: deploy
          depot1Path: game
          releaseBranch: preview

      - name: Clean build output
        run: sudo rm -rf BuildOutput

      - name: Deploy Demo to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          configVdf: ${{ secrets.STEAM_CONFIG_VDF }}
          appId: 4555340
          buildDescription: "Demo Build ${{ github.sha }}"
          rootPath: deploy
          depot1Path: demo

      - name: Notify Discord
        if: success()
        env:
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          BULLET_LIST=$(echo "$COMMITS_JSON" \
            | jq -r '.[] | "• " + (.message | split("\n")[0])')

          PAYLOAD=$(jq -n \
            --arg body "**New Patch:**\n${BULLET_LIST}\n\nLive on Preview branch now!" \
            '{content: $body}')

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
