name: Build and Deploy to Steam

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.1"
  EXPORT_NAME: Huebound
  PROJECT_PATH: .

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Install GodotSteam DLLs
        run: |
          mkdir -p ~/godotsteam
          wget -q https://codeberg.org/godotsteam/godotsteam/releases/download/v4.18/godotsteam-g461-s164-gs418-templates.tar.xz -O ~/godotsteam/templates.tar.xz
          tar -xf ~/godotsteam/templates.tar.xz -C ~/godotsteam
          cp ~/godotsteam/libgodotsteam.windows.template_release.x86_64.dll ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/windows_release_x86_64.exe || true
          cp ~/godotsteam/libgodotsteam.windows.template_debug.x86_64.dll ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/windows_debug_x86_64.exe || true

      - name: Clean export directories
        run: |
          # Remove Steam client junk committed to export directories
          rm -rf export/appcache export/bin export/config export/logs export/package export/public export/siteserverui export/steamapps export/userdata export/steam_api64.dll export/libgodotsteam.windows.template_release.x86_64.dll
          rm -rf export_demo/appcache export_demo/bin export_demo/config export_demo/logs export_demo/package export_demo/public export_demo/siteserverui export_demo/steamapps export_demo/userdata export_demo/steam_api64.dll export_demo/steamclient*.dll export_demo/crashhandler*.dll export_demo/steamconsole*.dll export_demo/tier0_s*.dll export_demo/vstdlib_s*.dll export_demo/steamcmd*.old export_demo/update_hosts_cached.vdf export_demo/steam.dll export_demo/libgodotsteam*.dll export_demo/huebound.zip
          mkdir -p export export_demo

      - name: Build Full Game
        run: |
          sed -i 's/const IS_DEMO := true/const IS_DEMO := false/g' scripts/autoloads/demo_config.gd
          godot --headless --export-release "Steam Windows" export/Huebound.exe
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Build Demo
        run: |
          sed -i 's/const IS_DEMO := false/const IS_DEMO := true/g' scripts/autoloads/demo_config.gd
          godot --headless --export-release "Steam Windows" export_demo/Huebound.exe
          sed -i 's/const IS_DEMO := true/const IS_DEMO := false/g' scripts/autoloads/demo_config.gd
        working-directory: ${{ env.PROJECT_PATH }}

      # Deploy Demo (always to default branch - no preview for demo)
      - name: Generate Steam TOTP
        uses: CyberAndrii/steam-totp@v1
        id: steam-totp
        with:
          shared_secret: ${{ secrets.STEAM_TOTP_SECRET }}
      - name: Deploy Demo to Steam
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          password: ${{ secrets.STEAM_PASSWORD }}
          totp: ${{ steps.steam-totp.outputs.code }}
          appId: 4555340
          buildDescription: "GitHub Actions Demo Build ${{ github.run_number }}"
          rootPath: export_demo
          depot1Path: .
          releaseBranch: default
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}

      # Deploy Main Game
      # - On master branch: to default branch
      # - On dev branch: to preview branch
      - name: Deploy Main Game to Steam (Default)
        if: github.ref == 'refs/heads/master'
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          password: ${{ secrets.STEAM_PASSWORD }}
          totp: ${{ steps.steam-totp.outputs.code }}
          appId: 4459040
          buildDescription: "GitHub Actions Build ${{ github.run_number }}"
          rootPath: export
          depot1Path: .
          releaseBranch: default
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}

      - name: Deploy Main Game to Steam (Preview)
        if: github.ref == 'refs/heads/dev'
        uses: game-ci/steam-deploy@v3
        with:
          username: ${{ secrets.STEAM_USERNAME }}
          password: ${{ secrets.STEAM_PASSWORD }}
          totp: ${{ steps.steam-totp.outputs.code }}
          appId: 4459040
          buildDescription: "GitHub Actions Preview Build ${{ github.run_number }}"
          rootPath: export
          depot1Path: .
          releaseBranch: default
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}

      # Promote main game to preview branch (only on dev)
      - name: Promote to Preview Branch
        if: github.ref == 'refs/heads/dev'
        env:
          STEAM_WEB_API_KEY: ${{ secrets.STEAM_WEB_API_KEY }}
          STEAM_BUILD_ID: ${{ secrets.STEAM_BUILD_ID }}
        run: |
          if [ -n "$STEAM_BUILD_ID" ]; then
            echo "Promoting main build to preview branch..."
            curl -X POST "https://partner.steam-api.com/ISteamApps/SetAppBuildLive/v1/" \
              -d "key=${STEAM_WEB_API_KEY}" \
              -d "appid=4459040" \
              -d "buildid=${STEAM_BUILD_ID}" \
              -d "betakey=preview"
          else
            echo "STEAM_BUILD_ID not set - skipping preview promotion"
          fi
